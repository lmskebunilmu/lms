<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Preview Materi</title>

<script>
  window.MathJax = {
    tex: {
      inlineMath: [['\\(', '\\)']],
      displayMath: [['\\[', '\\]']]
    }
  };
</script>

<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<style>
    /* =========================
   MODERN UI
========================= */
body {
  font-family: "Segoe UI", sans-serif;
  background: #f5f7fb;
}

/* content */
#contentWrapper {
  background: white;
  padding: 30px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.05);
}

/* =========================
   TOOLBAR MODERN
========================= */
#toolbar {
  position: fixed;
  top: 20px;
  left: 20px;
  z-index: 9999;
}

#toggleAnnotate {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #4f46e5, #6366f1);
  color: white;
  font-size: 20px;
  cursor: pointer;
  box-shadow: 0 6px 20px rgba(79,70,229,0.4);
  transition: 0.2s;
}

#toggleAnnotate:hover {
  transform: scale(1.05);
}

/* dropdown tools */
#tools {
  margin-top: 10px;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(12px);
  padding: 12px;
  border-radius: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: 140px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

/* hidden */
#tools.hidden {
  display: none;
}

/* buttons */
#tools button {
  background: #f1f5f9;
  border: none;
  padding: 8px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
}

#tools button:hover {
  background: #e2e8f0;
}

/* active tool */
#tools button.active {
  background: #4f46e5;
  color: white;
}

/* input */
#tools input,
#tools select {
  border-radius: 8px;
  border: 1px solid #ddd;
  padding: 5px;
}

#colorPalette {
  display: flex;
  gap: 8px;
  justify-content: center;
}

.color {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid white;
  box-shadow: 0 0 0 1px #d1d5db;
  transition: 0.2s;
}

.color.active {
  transform: scale(1.2);
  box-shadow: 0 0 0 2px #2563eb;
}

#viewerWrapper {
  position: relative;
}

#drawCanvas {
  position: absolute;
  top: 0;
  left: 0;
  z-index: 5;
  pointer-events: none;
}

#fakeCursor {
  position: fixed;
  top: 0;
  left: 0;
  font-size: 22px;
  pointer-events: none;
  z-index: 99999;
  transform: translate(-30%, -70%);
  display: none;
  
}


</style>
</head>

<body>

<div id="viewerWrapper">

  <div id="contentWrapper">
    <h2 id="title"></h2>
    <div id="content"></div>
  </div>

  <canvas id="drawCanvas"></canvas>

</div>

<!-- TOOLBAR -->
<div id="toolbar">

  <button id="toggleAnnotate">✏️</button>

  <div id="tools" class="hidden">
    <div id="colorPalette">
  <div class="color" data-color="#ef4444" style="background:#ef4444"></div>
  <div class="color" data-color="#3b82f6" style="background:#3b82f6"></div>
  <div class="color" data-color="#10b981" style="background:#10b981"></div>
  <div class="color" data-color="#f59e0b" style="background:#f59e0b"></div>
  <div class="color" data-color="#000000" style="background:#000000"></div>
</div>

    <select id="sizePicker">
      <option value="2">Tipis</option>
      <option value="5" selected>Sedang</option>
      <option value="10">Tebal</option>
    </select>

    <button id="penBtn">✏️</button>
    <button id="lineBtn">📏</button>
    <button id="eraserBtn">🧽</button>
    <button id="clearBtn">🗑</button>
  </div>

</div>
<div id="fakeCursor">✏️</div>
<script type="module">
import { db } from "../../firebase/firebase-config.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ==========================
// LOAD DATA
// ==========================
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if (!id) document.body.innerHTML = "<p>Materi tidak ditemukan</p>";

const snap = await getDoc(doc(db, "materials", id));

if (!snap.exists()) document.body.innerHTML = "<p>Materi tidak ditemukan</p>";

const m = snap.data();
document.querySelector('.color[data-color="#ef4444"]').classList.add("active");
document.getElementById("title").innerText = m.title;
document.getElementById("content").innerHTML = generateContent(m.content);

// ==========================
// MATHJAX + RESIZE
// ==========================
setTimeout(async () => {
  if (window.MathJax) {
    await MathJax.typesetPromise();
  }
  resizeCanvas();
}, 200);
// 🔥 TAMBAH DI SINI
setTimeout(resizeCanvas, 500);
setTimeout(resizeCanvas, 1000);

// ==========================
// CANVAS SETUP
// ==========================
const canvas = document.getElementById("drawCanvas");
const ctx = canvas.getContext("2d");
const fakeCursor = document.getElementById("fakeCursor"); 

let drawing = false;
let erasing = false;
let annotateMode = false;

let lastX = 0;
let lastY = 0;

let mode = "pen"; // pen | line | erase
let startX = 0;
let startY = 0;


const sizePicker = document.getElementById("sizePicker");
const tools = document.getElementById("tools");

// resize ikut konten
function resizeCanvas() {
  const wrapper = document.getElementById("viewerWrapper");

  // 🔥 ambil tinggi real konten (bukan viewport)
  const fullHeight = Math.max(
    wrapper.scrollHeight,
    wrapper.offsetHeight,
    document.body.scrollHeight
  );

  canvas.width = wrapper.clientWidth;
  canvas.height = fullHeight;
}
window.addEventListener("resize", resizeCanvas);
// ==========================
// MODE
// ==========================
document.getElementById("toggleAnnotate").onclick = () => {
  annotateMode = !annotateMode;

  canvas.style.pointerEvents = annotateMode ? "auto" : "none";
  tools.classList.toggle("hidden");

  document.body.style.cursor = annotateMode ? "none" : "default";
};

document.getElementById("penBtn").onclick = () => {
  mode = "pen";
  setActive("penBtn");
  fakeCursor.innerHTML = "✏️";
};

document.getElementById("lineBtn").onclick = () => {
  mode = "line";
  setActive("lineBtn");
  fakeCursor.innerHTML = "📏";
};

document.getElementById("eraserBtn").onclick = () => {
  mode = "erase";
  setActive("eraserBtn");
  fakeCursor.innerHTML = "🧽";
};

document.getElementById("eraserBtn").onclick = () => {
  mode = "erase";
  setActive("eraserBtn");
  document.body.style.cursor = "pointer";
};
document.getElementById("clearBtn").onclick = () =>
  ctx.clearRect(0, 0, canvas.width, canvas.height);

// ==========================
// POSISI MOUSE (FIX SCROLL)
// ==========================
function getPos(e) {
  const rect = canvas.getBoundingClientRect();

  return {
    x: e.clientX - rect.left,
    y: e.clientY - rect.top
  };
}

// ==========================
// DRAW
// ==========================
canvas.addEventListener("mousedown", (e) => {
  if (!annotateMode) return;

  const pos = getPos(e);

  drawing = true;

  startX = pos.x;
  startY = pos.y;

  lastX = pos.x;
  lastY = pos.y;
});

canvas.addEventListener("mouseup", (e) => {
  if (!drawing || !annotateMode) return;

  const pos = getPos(e);

  // 🔥 LINE MODE
  if (mode === "line") {
    ctx.beginPath();
    ctx.moveTo(startX, startY);
    ctx.lineTo(pos.x, pos.y);

    ctx.lineWidth = sizePicker.value;
    ctx.strokeStyle = currentColor;
    ctx.stroke();
  }

  drawing = false;
});

canvas.addEventListener("mousemove", (e) => {
  if (!drawing || !annotateMode) return;

  const pos = getPos(e);

  // ✏️ PEN
  if (mode === "pen") {
    ctx.lineWidth = sizePicker.value;
    ctx.lineCap = "round";
    ctx.strokeStyle = currentColor;

    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();

    lastX = pos.x;
    lastY = pos.y;
  }

  // 🧽 ERASER
  if (mode === "erase") {
    ctx.globalCompositeOperation = "destination-out";

    ctx.beginPath();
    ctx.arc(pos.x, pos.y, sizePicker.value * 2, 0, Math.PI * 2);
    ctx.fill();

    ctx.globalCompositeOperation = "source-over";
  }
});

// ==========================
// FAKE CURSOR MOVE
// ==========================
window.addEventListener("mousemove", (e) => {
  if (!annotateMode) {
    fakeCursor.style.display = "none";
    return;
  }

  fakeCursor.style.display = "block";
  fakeCursor.style.left = e.clientX + "px";
  fakeCursor.style.top = e.clientY + "px";
});
// ==========================
// HELPER
// ==========================
function generateContent(input) {
  let output = input;

  // =========================
  // YOUTUBE
  // =========================
  output = output.replace(
    /(https?:\/\/(www\.)?(youtube\.com|youtu\.be)\/[^\s<]+)/g,
    (url) => {

      let videoId = "";

      if (url.includes("watch?v=")) {
        videoId = url.split("watch?v=")[1].split("&")[0];
      }
      else if (url.includes("youtu.be/")) {
        videoId = url.split("youtu.be/")[1].split("?")[0];
      }

      return `
        <iframe
          width="100%"
          height="315"
          src="https://www.youtube.com/embed/${videoId}"
          frameborder="0"
          allowfullscreen>
        </iframe>
      `;
    }
  );

  // =========================
  // GOOGLE DRIVE
  // =========================
  output = output.replace(
    /https?:\/\/drive\.google\.com\/file\/d\/([^\/]+)\/view[^\s<]*/g,
    (match, fileId) => {

      return `
        <iframe
          src="https://drive.google.com/file/d/${fileId}/preview"
          width="100%"
          height="600"
          style="border:none;">
        </iframe>
      `;
    }
  );

  // =========================
  // PDF
  // =========================
  output = output.replace(
    /(https?:\/\/[^\s<]+\.pdf)/gi,
    (url) => `
      <iframe
        src="${url}"
        width="100%"
        height="600"
        style="border:none;">
      </iframe>
    `
  );

  // =========================
  // ODF / DOC / PPT / XLS
  // =========================
  output = output.replace(
    /(https?:\/\/[^\s<]+\.(odf|odt|ods|odp|doc|docx|ppt|pptx|xls|xlsx))/gi,
    (url) => `
      <iframe
        src="https://view.officeapps.live.com/op/embed.aspx?src=${encodeURIComponent(url)}"
        width="100%"
        height="600"
        style="border:none;">
      </iframe>
    `
  );

  // =========================
  // REMOVE SCRIPT
  // =========================
  output = output.replace(
    /<script[\s\S]*?>[\s\S]*?<\/script>/gi,
    ""
  );

  return output;
}
function setActive(btnId) {
  document.querySelectorAll("#tools button").forEach(b => {
    b.classList.remove("active");
  });

  document.getElementById(btnId).classList.add("active");
}

let currentColor = "#ef4444";

document.querySelectorAll(".color").forEach(el => {
  el.onclick = () => {

    // hapus active
    document.querySelectorAll(".color").forEach(c => {
      c.classList.remove("active");
    });

    // set aktif
    el.classList.add("active");

    // ambil warna
    currentColor = el.dataset.color;
  };
});
</script>

</body>
</html>
