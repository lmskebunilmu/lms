<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<title>Data Murid</title>

<link rel="stylesheet"
href="../../assets/css/style.css">

<link rel="stylesheet"
href="../../assets/css/responsive.css">

</head>

<body>

<div class="wrapper">

<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<!-- MAIN -->
<div class="main">

<!-- HEADER -->
<div id="header-container"></div>

<div class="card">

<h1>Data Murid</h1>

<button
class="btn-add"
onclick="openStudentModal()">

➕ Tambah Murid

</button>
<button onclick="exportStudentsToCSV()" class="btn-export">
  Export CSV
</button>
<button onclick="importStudentsCSV()" class="btn-import">
  📥 Import CSV
</button>
<input type="file" id="csvFileInput" accept=".csv" style="display:none">
<button onclick="downloadCSVTemplate()" class="btn-template">
  📄 Template CSV
</button>
<div class="search-box">
  <input
    type="text"
    id="studentSearch"
    name="studentSearchField"
    placeholder="🔍 Cari nama, email, atau kelas..."
    autocomplete="off">
  
  <select id="filterStatus">
    <option value="">Semua Status</option>
    <option value="aktif">Aktif</option>
    <option value="nonaktif">Nonaktif</option>
  </select>

  <select id="filterClass">
    <option value="">Semua Kelas</option>
    <!-- opsi kelas akan diisi otomatis dari loadClasses -->
  </select>
</div>
<div class="bulk-actions">
  <button onclick="bulkDelete()" class="btn-delete">🗑 Hapus</button>
  <button onclick="bulkActivate()" class="btn-status aktif">✅ Aktifkan</button>
  <button onclick="bulkDeactivate()" class="btn-status nonaktif">⛔ Nonaktifkan</button>
</div>
<div class="table-container">

<table>

<thead>
<tr>
  <th><input type="checkbox" id="selectAll"></th>
  <th>Nama</th>
  <th>Email</th>
  <th>Kelas</th>
  <th>Status</th>
  <th>Aksi</th>
</tr>
</thead>
<tbody id="studentTable">

<tr id="loadingRow">

<td colspan="6">

Memuat data...

</td>

</tr>

</tbody>
</table>

</div>

</div>

</div>

</div>

<!-- MODAL -->

<div id="studentModal" class="modal">

<div class="modal-content">

<h3>Tambah / Edit Murid</h3>

<input type="hidden" id="studentId">

<input
type="text"
id="studentName"
placeholder="Nama Murid">

<input
type="email"
id="studentEmail"
placeholder="Email Murid">

<input
type="password"
id="studentPassword"
placeholder="Password (hanya saat tambah)">

<select id="studentClass">

<option value="">
Pilih Kelas
</option>

</select>

<div class="modal-actions">

<button
class="primary"
onclick="saveStudent()">

Simpan

</button>

<button
class="danger"
onclick="closeStudentModal()">

Batal

</button>

</div>

</div>

</div>

<div id="toast" class="toast">
  <span id="toastMessage">
    Berhasil
  </span>
</div>
<div id="confirmModal" class="modal">

  <div class="modal-content">

    <h3 id="confirmTitle">Hapus Murid</h3>

    <p id="confirmMessage">
  Yakin ingin menghapus murid ini?
</p>
    <div class="modal-actions">

      <button
        class="danger"
        id="confirmDeleteBtn">

        Hapus

      </button>

      <button
        class="primary"
        onclick="closeConfirmModal()">

        Batal

      </button>

    </div>

  </div>

</div>
<div id="resetPasswordModal" class="modal">
  <div class="modal-content">
    <h3>Reset Password</h3>
    <p id="resetPasswordMessage">
      Yakin ingin mengirim email reset password ke <span id="resetEmail"></span>?
    </p>
    <div class="modal-actions">
      <button class="primary" id="confirmResetBtn">Kirim</button>
      <button class="danger" onclick="closeResetPasswordModal()">Batal</button>
    </div>
  </div>
</div>
<script
type="module"
src="./students.js"></script>

</body>

</html>
