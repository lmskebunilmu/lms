<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <title>Kelola Tugas</title>

  <!-- CSS Dashboard -->
  <link rel="stylesheet" href="../../assets/css/style.css">
  <link rel="stylesheet" href="../../assets/css/responsive.css">
</head>

<body>

<div class="wrapper">

  <!-- SIDEBAR -->
  <div id="sidebar-container"></div>

  <!-- MAIN -->
  <div class="main">

    <!-- HEADER -->
    <div id="header-container"></div>

    <h1>Kelola Tugas</h1>

    <!-- ==========================
         BUAT TUGAS (GURU)
    ========================== -->
    <div class="card" id="assignmentSection">

      <h3>Buat Tugas</h3>

      <input type="text" id="assignmentTitle" placeholder="Judul Tugas">
      <input type="text" id="subjectName" placeholder="Mata Pelajaran">
      <input type="text" id="className" placeholder="Kelas">

      <textarea id="assignmentDescription" placeholder="Deskripsi Tugas"></textarea>

      <button class="btn-edit" onclick="addAssignment()">
        Buat Tugas
      </button>

    </div>

    
    <!-- ==========================
         DAFTAR TUGAS
    ========================== -->
    <div class="card">

      <h3>Daftar Tugas</h3>

      <ul id="assignmentList"></ul>

    </div>

    <!-- ==========================
         SUBMISSION SISWA
    ========================== -->
    <div class="card" id="submissionSectionStudent">
  <h3>Kirim Jawaban</h3>

  <input type="text" id="studentNameStudent" placeholder="Nama Siswa">
  <input type="text" id="assignmentTitleInputStudent" placeholder="Judul Tugas">
  <textarea id="submissionTextStudent" placeholder="Jawaban Anda"></textarea>

  <button class="primary" onclick="submitAssignment()">
    Kirim Jawaban
  </button>
</div>

    <!-- ==========================
         NILAI SISWA
    ========================== -->
    <div class="card" id="studentGradeSection">

      <h3>Nilai Saya</h3>

      <ul id="gradeList"></ul>

    </div>

    <!-- ==========================
         JAWABAN UNTUK GURU
    ========================== -->
    <div class="card" id="teacherSubmissionSection">

      <h3>Jawaban Siswa</h3>

      <ul id="submissionList"></ul>

    </div>

    <!-- ==========================
         BACK BUTTON
    ========================== -->
    <div style="margin-top:20px;">
      <button class="btn-edit" onclick="backDashboard()">
        Kembali Dashboard
      </button>
    </div>

  </div>

</div>

<!-- JS -->
<script type="module" src="assignments.js"></script>

</body>
</html>
