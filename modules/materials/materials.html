<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Kelola Materi</title>
<link rel="stylesheet" href="../../assets/css/style.css">
<link rel="stylesheet" href="../../assets/css/responsive.css">
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" id="MathJax-script"></script>
</head>
<body>
<div class="wrapper">

  <!-- SIDEBAR -->
  <div id="sidebar-container"></div>

  <!-- MAIN -->
  <div class="main">

    <!-- HEADER -->
    <div id="header-container"></div>

    <!-- TOMBOL TAMBAH -->
    <div class="card">
      <button class="primary" onclick="showAddForm()">➕ Tambah Materi</button>
    </div>

    <!-- LIST -->
    <div class="card">
      <h3>Daftar Materi</h3>
      <input type="text" id="searchMaterial" placeholder="Cari materi..." oninput="filterMaterials()">
      <table class="table">
  <thead>
    <tr>
      <th>Judul</th>
      <th>Pembuat</th>
      <th>Level</th>
      <th>Kurikulum</th>
      <th>Mapel</th>
      <th>Bab</th>
      <th>Aksi</th>
    </tr>
  </thead>
  <tbody id="materialList"></tbody>
</table>

      <!-- PAGINATION -->
      <div style="display:flex;gap:10px;margin-top:12px;">
        <button class="primary" onclick="prevPage()">⬅ Sebelumnya</button>
        <button class="primary" onclick="nextPage()">➡ Berikutnya</button>
      </div>
    </div>

    <!-- MODAL -->
    <div id="materialModal" class="modal">
      <div class="modal-content">
        <h3 id="formTitle">Tambah Materi</h3>
        <input type="text" id="materialTitle" placeholder="Judul Materi">
       
        <select id="level">
  <option value="SD">SD</option>
  <option value="SMP">SMP</option>
  <option value="SMA">SMA</option>
</select>

<select id="curriculum">
  <option value="Nasional">Nasional</option>
  <option value="Internasional">Internasional</option>
</select>

<input type="text" id="subject" placeholder="Mapel">
<input type="text" id="chapter" placeholder="Bab">
<input type="text" id="subChapter" placeholder="Sub Bab">
        <div style="font-size:12px;color:gray;margin-top:6px;">
              <textarea id="materialContent" oninput="updatePreview()"
  placeholder="Isi materi (HTML / YouTube / PDF)">
</textarea>

<h4>Live Preview:</h4>

<iframe id="previewFrame" sandbox="allow-scripts allow-same-origin"
  style="width:100%;height:300px;border:1px solid #ccc;">
</iframe>
</div>
        
        <div class="modal-actions">
          <button class="primary" onclick="saveMaterial()">Simpan</button>
          <button class="danger" onclick="closeForm()">Batal</button>
        </div>
      </div>
    </div>

    <!-- DELETE MODAL -->
    <div id="deleteMaterialModal" class="modal">
      <div class="modal-content">
        <p id="deleteMaterialMessage"></p>
        <div class="modal-actions">
          <button id="deleteMaterialYes" class="btn-warning">Ya</button>
          <button id="deleteMaterialNo" class="btn-danger">Tidak</button>
        </div>
      </div>
    </div>

    <div id="viewMaterialModal" class="modal">
  <div class="modal-content">
    <h3 id="viewMaterialTitle"></h3>
    <iframe id="viewMaterialFrame" sandbox="allow-scripts allow-same-origin" style="width:100%;height:400px;border:1px solid #ccc;"></iframe>
    <div class="modal-actions">
      <button class="primary" onclick="closeViewModal()">Tutup</button>
    </div>
  </div>
</div>


    <!-- TOAST -->
    <div id="toast" class="toast"></div>

  </div>
</div>

<script type="module" src="materials.js"></script>
</body>
</html>
