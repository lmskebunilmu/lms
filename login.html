<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta
  name="viewport"
  content="width=device-width,initial-scale=1.0"
>

<title>Login LMS</title>

<link
  rel="stylesheet"
  href="assets/css/style.css"
>

<link
  rel="stylesheet"
  href="assets/css/responsive.css"
>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  background:#f1f5f9;
}

/* =========================
   CONTAINER
========================= */

.login-container{

  min-height:100vh;

  display:flex;

  justify-content:center;

  align-items:center;

  padding:20px;

}

/* =========================
   CARD
========================= */

.login-card{

  width:100%;

  max-width:420px;

  background:white;

  padding:35px;

  border-radius:18px;

  box-shadow:
  0 10px 25px rgba(0,0,0,0.08);

}

/* =========================
   TITLE
========================= */

.login-card h2{

  text-align:center;

  margin-bottom:24px;

  color:#0f172a;

  font-size:28px;

}

/* =========================
   INPUT
========================= */

input{

  width:100%;

  padding:14px;

  margin-bottom:16px;

  border:1px solid #cbd5e1;

  border-radius:12px;

  font-size:15px;

  outline:none;

  transition:0.2s;

}

input:focus{

  border-color:#2563eb;

  box-shadow:
  0 0 0 3px rgba(37,99,235,0.15);

}

/* =========================
   BUTTON
========================= */

button{

  width:100%;

  padding:14px;

  border:none;

  border-radius:12px;

  background:#2563eb;

  color:white;

  font-size:15px;

  font-weight:bold;

  cursor:pointer;

  transition:0.2s;

}

button:hover{

  background:#1d4ed8;

  transform:translateY(-1px);

}

/* =========================
   MOBILE
========================= */

@media(max-width:768px){

  .login-card{

    max-width:100%;

    padding:28px;

    border-radius:16px;

  }

  .login-card h2{

    font-size:24px;

  }

  input{

    padding:13px;

    font-size:14px;

  }

  button{

    padding:13px;

    font-size:14px;

  }

}

/* =========================
   SMALL PHONE
========================= */

@media(max-width:480px){

  .login-container{

    padding:16px;

  }

  .login-card{

    padding:22px;

    border-radius:14px;

  }

  .login-card h2{

    font-size:22px;

    margin-bottom:20px;

  }

  input{

    padding:12px;

    margin-bottom:14px;

  }

  button{

    padding:12px;

  }

}

</style>
</head>

<body>

<div class="login-container">

  <div class="login-card">

    <h2>Login LMS</h2>

    <input
      type="email"
      id="email"
      placeholder="Email"
    >

    <input
      type="password"
      id="password"
      placeholder="Password"
    >

    <button onclick="login()">
      Login
    </button>

  </div>

</div>

<script type="module">

import { auth, db }
from "./firebase/firebase-config.js";

import {
  signInWithEmailAndPassword
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  doc,
  getDoc
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* =========================
   REDIRECT ROLE
========================= */

async function redirectByRole(uid){

  const userRef =
  doc(db, "users", uid);

  const userDoc =
  await getDoc(userRef);

  if (!userDoc.exists()) {

    alert("Data user tidak ditemukan");

    return;

  }

  const role =
  userDoc.data().role;

  if (role === "super_admin")

    window.location =
    "dashboard/superadmin.html";

  else if (role === "admin")

    window.location =
    "dashboard/admin.html";

  else if (role === "guru")

    window.location =
    "dashboard/guru.html";

  else if (
    role === "siswa" ||
    role === "student"
  )

    window.location =
    "dashboard/student.html";

  else

    alert("Role tidak valid");

}

/* =========================
   LOGIN
========================= */

async function login(){

  const email =
  document.getElementById("email")
  .value
  .trim();

  const password =
  document.getElementById("password")
  .value;

  try {

    const userCredential =
    await signInWithEmailAndPassword(

      auth,
      email,
      password

    );

    await redirectByRole(
      userCredential.user.uid
    );

  }

  catch(error){

    alert(error.message);

  }

}

window.login = login;

</script>

</body>
</html>
