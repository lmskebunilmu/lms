<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Super Admin Dashboard</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    /* Pastikan profil card selalu terlihat */
    .profile-card { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
    .avatar-wrapper img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; }
  </style>
  <link rel="icon" type="image/png" href="https://zahwan93.github.io/Kebun-Ilmu-Matematika-SMP/logo.png">

</head>
<body>

<div class="wrapper">

  <!-- SIDEBAR -->
  <div id="sidebar-container"></div>

  <!-- MAIN CONTENT -->
  <div class="main">

    <!-- HEADER -->
    <div id="header-container"></div>

    <!-- PROFILE CARD -->
    <div class="profile-card" id="profileCard">
        <div class="avatar-wrapper">
            <img src="../assets/images/default-avatar.png" class="avatar-profile" id="headerAvatarCard" alt="Avatar Admin">
        </div>
        <div class="profile-info-wrapper">
            <div class="profile-info">
                <h2 id="headerNameCard">Nama Admin</h2>
                <p id="headerEmailCard">admin@email.com</p>
            </div>
            <button class="btn-edit" onclick="openProfileModal()">Edit Profile</button>
        </div>
    </div>

    <!-- DASHBOARD CARD -->
    <div class="card">
      <h1>Dashboard Super Admin LMS</h1>
      <hr>

      <!-- Statistik -->
      <h3>Statistik</h3>
      <div class="stats" style="display:flex; gap:20px;">
        <div class="card" style="flex:1; text-align:center;">
          <h2 id="totalSchools">0</h2>
          <p>Sekolah Terdaftar</p>
        </div>
        <div class="card" style="flex:1; text-align:center;">
          <h2 id="totalAdmins">0</h2>
          <p>Admin Terdaftar</p>
        </div>
      </div>

      <!-- Aktivitas Terbaru -->
      <h3 style="margin-top:24px;">Aktivitas Terbaru</h3>
      <div class="timeline" id="activityTimeline"></div>

      <!-- Sekolah per Kota -->
      <h3 style="margin-top:24px;">Sekolah per Kota</h3>
      <canvas id="schoolChart" style="max-width:400px;"></canvas>
    </div>

  </div>
</div>

<!-- EDIT PROFILE MODAL -->
<div id="profileModal" class="modal">
  <div class="modal-content">
    <h3>Edit Profile</h3>

    <input type="text" id="profileName" placeholder="Nama Lengkap">

    <input type="email" id="profileEmail" placeholder="Email">

    <!-- URL manual (opsional) -->
    <input type="text" id="profileAvatar" placeholder="URL Avatar (opsional)">

    <!-- Upload file -->
    <label>Upload Avatar</label>
    <input type="file" id="avatarFile" accept="image/*">

    <div class="modal-actions">
      <button class="primary" onclick="saveProfile()">Simpan</button>
      <button class="danger" onclick="closeProfileModal()">Batal</button>
    </div>
  </div>
</div>

<script type="module" src="./dashboard.js"></script>
</body>
</html>
